            <h1>Livia - Smażalnia Niechorze | Wędzarnia Niechorze | Ryby Niechorze</h1>
            <p>Zapraszamy do Livia! Tradycyjna, rodzinna smażalnia oraz rzemieślnicza wędzarnia u Ciszków w Niechorzu. Serwujemy wyjątkowo smaczne, świeże ryby smażone na złocisty kolor oraz wędzone naturalnym dymem olchowo-bukowym bezpośrednio na miejscu.</p>
          </section>

          <!-- Sekcja O nas / Tradycja -->
          <section id="o-nas">
            <h2>Rzemieślnicza Tradycja u Ciszków w Niechorzu</h2>
            <p>Szukasz najlepszej <strong>smażalni w Niechorzu</strong>? A może interesuje Cię prawdziwa, rybacka <strong>wędzarnia Niechorze</strong>? Livia u Ciszków to miejsce tworzone z sercem od pokoleń. Wybierając nas, masz pewność, że otrzymujesz doskonałej jakości <strong>ryby Niechorze</strong> – świeże, soczyste i przygotowane według ściśle strzeżonych receptur.</p>
            <p>Nasze ryby wędzimy w tradycyjny sposób na drewnie owocowym, bukowym i olchowym. Wyjątkowy aromat wędzonego łososia, halibuta czy pstrąga przyciąga koneserów z całego wybrzeża zachodniopomorskiego.</p>
          </section>

          <!-- Sekcja Menu z asortymentem ryb -->
          <section id="produkty">
            <h2>Menu - Najlepsze Smażone i Wędzone Ryby Niechorze</h2>
            <p>Nasza oferta rybna obejmuje tradycyjnie przygotowywane potrawy rybne, świeże ryby prosto z pieca oraz rzemieślnicze przetwory:</p>
            <ul>
              <li>
                <h3>Domowy Paprykarz Rybny</h3>
                <p>Wyrób własny u Ciszków wg tradycyjnej, domowej receptury. Kultowy paprykarz rybny z Niechorza.</p>
              </li>
              <li>
                <h3>Filet z łososia z pieca w sosie szpinakowym</h3>
                <p>Soczysty łosoś pieczony podawany w aksamitnym, delikatnym sosie szpinakowym.</p>
              </li>
              <li>
                <h3>Gołąbki rybne</h3>
                <p>Unikalne gołąbki z delikatnym farszem rybnym, serwowane w tradycyjnym sosie pomidorowym.</p>
              </li>
              <li>
                <h3>Halibut w sosie kurkowym</h3>
                <p>Wyśmienity pieczony halibut serwowany w szlachetnym, gęstym sosie ze świeżych kurkowych grzybów.</p>
              </li>
              <li>
                <h3>Polędwica z dorsza w sosie Livorno</h3>
                <p>Soczysta i delikatna polędwica ze świeżego dorsza, przyrządzona w tradycyjnym, aromatycznym sosie Livorno.</p>
              </li>
              <li>
                <h3>Fishburger u Ciszków</h3>
                <p>Chrupiący burger z soczystym kawałkiem ryby, unikalną kompozycją świeżych warzyw oraz autorskim sosem.</p>
              </li>
              <li>
                <h3>Rozgrzewający krem z pomidorów z rybą</h3>
                <p>Esencjonalna, rozgrzewająca zupa rybna przygotowana na bazie najlepszych tradycyjnych składników.</p>
              </li>
              <li>
                <h3>Świeże ryby i przetwory wędzarnicze</h3>
                <p>Gablota pełna najświeższych ryb bałtyckich i oceanicznych, a także gotowych przetworów i sałatek.</p>
              </li>
              <li>
                <h3>Rzemieślnicza wędzarnia ryb Niechorze</h3>
                <p>Tradycyjne wędzenie ryb na drewnie olchowym i bukowym bezpośrednio na tarasie naszej restauracji.</p>
              </li>
              <li>
                <h3>Domowe śledzie i marynaty rybne</h3>
                <p>Ulubione śledzie tradycyjne, sałatki z ryb oraz domowe marynaty prosto z naszej kuchni.</p>
              </li>
              <li>
                <h3>Chrupiąca smażona flądra Niechorze</h3>
                <p>Ryba klasyka nad polskim morzem – chrupiąca flądra usmażona na idealny złocisty kolor u Ciszków.</p>
              </li>
              <li>
                <h3>Złocisty smażony dorsz filet</h3>
