name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Add your deployment steps here (e.g., Firebase, GitHub Pages, etc.)
      # Since this app runs in AI Studio's Cloud Run environment, 
      # the platform handles its own deployment workflow.
      # This file is provided as requested for user's GitHub integration.
